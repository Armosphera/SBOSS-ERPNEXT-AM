name: Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Backwards-compatibility window: localization apps MUST work against the last 3
# minor versions of ERPNext v15.x. See docs/architecture.md "Upstream-
# survivability contract" (operator requirement 2026-06-24).
env:
  ERPNEXT_PINS: "15.3.0,15.2.0,15.1.0"

jobs:
  verify-isolation:
    name: Verify task isolation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install swarm CLI
        run: |
          python -m pip install --upgrade pip
      - name: Validate state.json schema
        run: python tools/swarm/swarm.py validate-state
      - name: Verify no active tasks overlap (skip if no tasks)
        run: |
          ACTIVE=$(python -c "import json; d=json.load(open('.orchestration/state.json')); print(sum(1 for t in d['tasks'].values() if t['status'] in ('claimed','in_progress','in_review')))")
          if [ "$ACTIVE" -gt 0 ]; then
            echo "Active tasks found; running isolation check (this is informational only in CI)"
          else
            echo "No active tasks; isolation check skipped"
          fi
      - name: Portfolio drift check
        run: node tools/check-portfolio-drift.js

  bench-matrix:
    name: ERPNext ${{ matrix.pin }} compatibility
    runs-on: ubuntu-latest
    needs: verify-isolation
    strategy:
      fail-fast: false
      matrix:
        pin: ${{ fromJson(env.ERPNEXT_PINS) }}
    steps:
      - uses: actions/checkout@v4
      - name: Set Python
        uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Boot bench + ERPNext ${{ matrix.pin }} in Docker
        run: |
          docker compose -f infra/compose/ci.yml up -d
          # Wait for the bench init to complete
          docker compose -f infra/compose/ci.yml logs -f bench-init | head -200
        env:
          ERPNEXT_PIN: ${{ matrix.pin }}
      - name: Install localization apps
        run: |
          docker compose -f infra/compose/ci.yml exec -T bench \
            bench --site test.localhost install-app frappe_armenia frappe_uae frappe_ai_local
      - name: Run full test suite
        run: |
          docker compose -f infra/compose/ci.yml exec -T bench \
            bench --site test.localhost run-tests --app frappe_armenia,frappe_uae,frappe_ai_local
      - name: Tear down
        if: always()
        run: docker compose -f infra/compose/ci.yml down -v

  portfolio-drift:
    name: Repo set matches expected-repos.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check armosphera org matches expected
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node tools/check-portfolio-drift.js

  python-lint:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check libs/ tools/
        continue-on-error: true   # placeholder: real apps come later

  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: '**/*.md'
