---
# Pre-commit configuration for SBOSS-ERPNEXT-AM
# See https://pre-commit.com for installation.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict
      - id: detect-private-key
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
  - repo: https://github.com/commitlint/commitlint
    rev: v19.5.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ["@commitlint/config-conventional"]
  - repo: local
    hooks:
      - id: no-backticks-in-commit-subject
        name: No unescaped backticks in commit subject
        entry: 'bash -c "msg=$(cat); subject=$(echo "$msg" | head -1); echo \"$subject\" | grep -qE \"\`[^\\\`]+ \`\" && { echo \"ERROR: unescaped backticks in subject — use single-quote the commit message\"; exit 1; } || exit 0"'
        language: system
        stages: [commit-msg]
        pass_filenames: false
