services:
  mariadb:
    image: mariadb:10.6
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123"]
      interval: 5s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  bench:
    build:
      context: ${SBOSS_REPO:-/Users/samvelstepanyan/Desktop/SBOSS-ERPNEXT-AM}
      dockerfile: infra/docker/dev.Dockerfile
    image: sboss-dev:latest
    restart: unless-stopped
    depends_on:
      mariadb: { condition: service_healthy }
      redis:   { condition: service_healthy }
    environment:
      BENCH_PATH: /workspace
    ports:
      - "8000:8000"   # Frappe web
      - "9000:9000"   # Socket.IO
      - "11434:11434" # Ollama
    volumes:
      - ${SBOSS_REPO:-/Users/samvelstepanyan/Desktop/SBOSS-ERPNEXT-AM}:/workspace
    command: >
      bash -c "
        echo 'Container started; bench-init is idempotent and safe to re-run' &&
        echo 'Run manually: docker exec -it compose-bench-1 bench-init' &&
        sleep infinity"

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    profiles: ["ollama"]   # opt-in: docker compose --profile ollama up
    # 4B model runs fine on CPU; uncomment for GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

ollama-pull:
    image: curlimages/curl:latest
    profiles: ["ollama"]   # opt-in
    depends_on:
      - ollama
    entrypoint: ["/bin/sh", "-c"]
    # Pulls a curated set of models so the user can switch between them
    # via Site Config `ollama_default_model` without re-running this
    # container. Both models are kept warm in the Ollama daemon.
    command: >
      "until curl -s http://ollama:11434/api/version >/dev/null; do sleep 2; done &&
       echo '==> Pulling gemma4:e2b (Gemma 4 Effective 2B, Q4_K_M 7.2 GB)' &&
       curl -X POST http://ollama:11434/api/pull -d '{\"name\":\"gemma4:e2b\"}' &&
       echo 'done' &&
       echo '==> Pulling gemma2:2b (Gemma 2 2B, Q4_0 1.6 GB)' &&
       curl -X POST http://ollama:11434/api/pull -d '{\"name\":\"gemma2:2b\"}' &&
       echo 'all-done'"

volumes:
  mariadb-data:
  ollama-data:
